name: Build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y nasm binutils zip

      - name: Build
        run: make

      - name: Smoke test
        run: ./asmatrix --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asmatrix-linux-x86_64
          path: asmatrix
          retention-days: 7

  release:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: asmatrix-linux-x86_64

      - name: Rename for release
        run: mv asmatrix asmatrix-linux-x86_64

      - name: Create source archives
        run: |
          tar -czf asmatrix-src.tar.gz --exclude='.git' .
          zip -r asmatrix-src.zip . -x '.git/*'

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: |
            asmatrix-linux-x86_64
            asmatrix-src.zip
            asmatrix-src.tar.gz
          generate_release_notes: false